

<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <link rel='stylesheet' href="{{url_for('static' , filename= 'login/all.css')}}">
  <link rel='stylesheet' href="{{url_for('static' , filename= 'login/fontawesome.css')}}">
  <link rel='stylesheet' href="{{url_for('static' , filename= 'login/style.css')}}">
</head>
<body>
<!-- partial:index.partial.html -->
<div class="container">
	<div class="screen">
		<div class="screen__content">
			<form class="login" action="/adduser"   method="POST">
				<div class="login__field">
					<i class="login__icon fas fa-user"></i>
					<input type="text" class="login__input" placeholder="User name / phone" name="username">
				</div>
				<div class="login__field">
					<i class="login__icon fas fa-lock"></i>
					<input type="password" class="login__input" placeholder="Password"   name="password">
				</div>
				<button class="button login__submit">
					<span class="button__text">Log in</span>
					<i class="button__icon fas fa-chevron-right"></i>
				</button>				
			</form>
		</div>
	
	</div>
</div>
<footer>
    <p>&copy; 2023 Playpit. All rights reserved.</p>
  </footer>
  
</body>
</html>
