<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Your Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --error: #dc2626;
            --success: #16a34a;
            --text-main: #1f2937;
            --text-secondary: #6b7280;
            --bg-light: #f9fafb;
            --border: #e5e7eb;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .login-container {
            background-color: white;
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        .login-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .login-logo {
            margin-bottom: 1rem;
            font-size: 2rem;
            color: var(--primary);
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.9375rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .login-button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .signup-link {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
            margin-left: 0.25rem;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: white;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-button:hover {
            background-color: var(--bg-light);
        }

        .error-message {
            color: var(--error);
            font-size: 0.8125rem;
            margin-top: 0.25rem;
            display: none;
        }

        .input-error {
            border-color: var(--error) !important;
        }

        .input-error:focus {
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1) !important;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }
        }

        /* Animation for error messages */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-store"></i>
            </div>
            <h1 class="login-title">Welcome back</h1>
            <p class="login-subtitle">Sign in to your account to continue</p>
        </div>

        <!-- Login Form -->
        <form method="POST" class="login-form" id="loginForm">
            <div class="form-group">
                <label for="identifier" class="form-label">Email or Username</label>
                <input 
                    type="text" 
                    id="identifier" 
                    name="identifier" 
                    class="form-input" 
                    placeholder="you@example.com or username"
                    autocomplete="username"
                >
                <div class="error-message" id="identifier-error">Please enter a valid email or username</div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="password-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password" 
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="error-message" id="password-error">Please enter your password</div>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" name="remember" id="remember">
                    Remember me
                </label>
                <a href="{{ url_for('user.forgot_password') }}" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-button">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>
        </form>

        <div class="divider">OR</div>

        <div class="social-login">
            <button type="button" class="social-button">
                <i class="fab fa-google" style="color: #DB4437;"></i>
                Continue with Google
            </button>
            <button type="button" class="social-button">
                <i class="fab fa-facebook-f" style="color: #1877F2;"></i>
                Continue with Facebook
            </button>
        </div>

        <div class="login-footer">
            Don't have an account? 
            <a href="{{ url_for('user.register') }}" class="signup-link">Sign up</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const togglePassword = document.querySelector('.toggle-password');
            const passwordInput = document.getElementById('password');
            const identifierInput = document.getElementById('identifier');
            const identifierError = document.getElementById('identifier-error');
            const passwordError = document.getElementById('password-error');

            // Toggle password visibility
            togglePassword.addEventListener('click', function() {
                const icon = this.querySelector('i');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });

            // Form validation
            loginForm.addEventListener('submit', function(e) {
                let isValid = true;
                
                // Validate identifier
                if (!identifierInput.value.trim()) {
                    identifierInput.classList.add('input-error');
                    identifierError.style.display = 'block';
                    identifierInput.classList.add('shake');
                    isValid = false;
                } else {
                    identifierInput.classList.remove('input-error');
                    identifierError.style.display = 'none';
                }
                
                // Validate password
                if (!passwordInput.value.trim()) {
                    passwordInput.classList.add('input-error');
                    passwordError.style.display = 'block';
                    passwordInput.classList.add('shake');
                    isValid = false;
                } else {
                    passwordInput.classList.remove('input-error');
                    passwordError.style.display = 'none';
                }
                
                // Remove shake animation after it completes
                const inputs = [identifierInput, passwordInput];
                inputs.forEach(input => {
                    input.addEventListener('animationend', () => {
                        input.classList.remove('shake');
                    }, { once: true });
                });
                
                if (!isValid) {
                    e.preventDefault();
                }
            });

            // Clear errors when typing
            identifierInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('input-error');
                    identifierError.style.display = 'none';
                }
            });
            
            passwordInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('input-error');
                    passwordError.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
