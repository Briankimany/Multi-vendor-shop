{% extends "vendor/base.html" %}

{% block content %}
<div class="add-product-container">
    <h1>Add New Product</h1>

    <div class="add-form-wrapper">
        <form method="post" class="add-product-form">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" placeholder="Enter product name" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" placeholder="Product category">
            </div>

            <div class="form-group full-width">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Product Description"></textarea>
            </div>

            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" step="0.01" placeholder="Enter price" required>
            </div>

            <div class="form-group">
                <label for="stock">Stock</label>
                <input type="number" id="stock" name="stock" placeholder="Available stock" required>
            </div>

            <div class="form-group">
                <label for="image_url">Image URL</label>
                <input type="text" id="image_url" name="image_url" placeholder="Product image URL">
            </div>

            <div class="form-group">
                <label for="preview_url">Preview URL</label>
                <input type="text" id="preview_url" name="preview_url" placeholder="Product preview URL">
            </div>

            <div class="form-group full-width">
                <button type="submit" class="add-button">Add Product</button>
            </div>
        </form>
    </div>
</div>
<style>
    /* Main Container */
.add-product-container {
    width: 95%;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
}

/* Page Title */
.add-product-container h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 20px;
}

/* Form Layout */
.add-product-form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Adjusts dynamically */
    gap: 16px;
}

/* Full-width Elements */
.full-width {
    grid-column: span 2; /* Expands on large screens */
}

/* Form Fields */
.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-weight: bold;
    color: #333;
    margin-bottom: 5px;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

.form-group textarea {
    height: 80px;
    resize: vertical;
}

/* Submit Button */
.add-button {
    background: #28a745;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.add-button:hover {
    background: #218838;
}

/* Responsive Design */
@media (max-width: 768px) {
    .add-product-form {
        display: flex;
        flex-direction: column;
    }

    .full-width {
        grid-column: span 1; /* Stacks in mobile */
    }
}

</style>
{% endblock %}
