{% extends "shop/base.html" %}

{% block title %}Vendor Products{% endblock %}

{% block content %}
    <h2>Vendor Products</h2>
    <div>
        {% for product in products %}
            <div>
                <img src="{{ product.image_url }}" alt="{{ product.name }}" width="100">
                <h3>{{ product.name }}</h3>
                <p>Price: ${{ product.price }}</p>
                <a href="{{ url_for('shop.specific_product', product_id=product.id) }}">View Details</a>
                <form action="{{ url_for('shop.add_to_cart', product_id=product.id) }}" method="POST">
                    <input type="number" name="quantity" value="1" min="1">
                    <button type="submit">Add to Cart</button>
                </form>
            </div>
        {% endfor %}
    </div>
{% endblock %}
