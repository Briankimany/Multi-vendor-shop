{% extends "shop/base2.html" %}

{% block title %}Payment{% endblock %}


{% block content %}
<div class="container">
    <h2>Confirm Payment</h2>
    <form id="payment-form">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" name="phone" placeholder="Enter phone number" value="{{ phone if phone else '' }}" required>

        <label for="amount">Amount:</label>
        <input type="text" id="amount" name="amount" value="{{ total_cost }}" readonly>

        <button type="button" id="confirm-btn">Confirm Payment</button>
    </form>

    <!-- 🔄 Loading Spinner & Status Message -->
    <div id="loading-container" class="loading-container" style="display: none;">
        <div class="spinner"></div>
        <p>Processing Payment...</p>
    </div>
    <div id="status-message"></div>
</div>
{% endblock %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/payment.css') }}">
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/payment.js') }}"></script>
{% endblock %}
