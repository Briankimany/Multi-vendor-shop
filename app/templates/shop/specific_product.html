{% extends "shop/base.html" %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
    <h2>{{ product.name }}</h2>
    <img src="{{ product.image_url }}" alt="{{ product.name }}" width="300">
    <p>{{ product.description }}</p>
    <p>Price: ${{ product.price }}</p>
    <form action="{{ url_for('shop.add_to_cart', product_id=product.id) }}" method="POST">
        <input type="number" name="quantity" value="1" min="1">
        <button type="submit">Add to Cart</button>
    </form>
    <a href="{{ url_for('shop.vendor_products', vendor_id=session['vendor_id']) }}">Back to Products</a>
{% endblock %}
